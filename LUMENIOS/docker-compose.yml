version: '3.8'

volumes:
  local_postgres_data: {}
  local_postgres_data_backups: {}
  local_static_volume: {}
  local_media_volume: {}

services:
  # --- DJANGO (Backend) ---
  django:
    build:
      context: .
      dockerfile: ./docker/local/django/Dockerfile
    image: niocortex_local_django
    container_name: niocortex_django
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app:z  # Live Reload do código
      - local_static_volume:/app/static # Compartilha estáticos
      - local_media_volume:/app/media   # Compartilha uploads
    env_file:
      - .env
    ports:
      - "8000:8000" # Acesso direto ao Django (Debug)
    command: /start

  # --- NGINX (Proxy Reverso Local) ---
  nginx:
    build:
      context: ./docker/local/nginx
      dockerfile: Dockerfile
    image: niocortex_local_nginx
    container_name: niocortex_nginx
    depends_on:
      - django
    volumes:
      - local_static_volume:/app/static
      - local_media_volume:/app/media
    ports:
      - "80:80" # Acesso via Nginx (Simula Produção)

  # --- POSTGRES ---
  postgres:
    image: postgres:15
    container_name: niocortex_postgres
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - local_postgres_data_backups:/backups
    env_file:
      - .env
    ports:
      - "5432:5432"

  # --- REDIS ---
  redis:
    image: redis:7-alpine
    container_name: niocortex_redis
    ports:
      - "6379:6379"